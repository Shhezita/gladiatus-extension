<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gladiatus Auction Scanner</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header>
      <h1>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--glad-border-active);"><path d="m14.5 16 3.5-3.5L14.5 9"/><path d="M9.5 8 6 11.5l3.5 3.5"/><path d="M16 4v16M8 4v16"/></svg>
        Gladiatus
      </h1>
      <button id="scan-button" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        Scan
      </button>
    </header>

    <p id="status">Open a Gladiatus auction page, then scan.</p>

    <nav id="page-tabs" class="page-tabs"></nav>
    <section id="summary" hidden></section>
    <nav id="tabs" class="tabs" hidden></nav>
    <section id="controls" class="controls" hidden></section>
    <section id="results" class="results"></section>

    <script src="auction-schema.js"></script>
    <script src="score-model.js"></script>
    <script src="auction-model.js"></script>
    <script src="auction-core.js"></script>
    <script src="arena-core.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
